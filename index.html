        `<div>

Дочитывание. Самый жирный плюс в карму автора. Читатель открыл статью и прошёл её до конца — значит, контент оправдал ожидания, заголовок не соврал, текст был годным. Алгоритм видит это и кивает: «Окей, классный материал, расширяем аудиторию». Дочитывание — это не просто сигнал, это валюта Дзена. Ради него мы здесь и собрались.

Жалоба. Это уже серьёзно. Читатель пожаловался на контент — алгоритм отправляет материал на проверку. Если жалоба обоснована, публикацию могут ограничить в показах, а в худшем случае — снять монетизацию или наказать канал. Системные жалобы — путь к бану.

Есть действия, которые алгоритм замечает, но не относит ни к плюсам, ни к минусам напрямую. Скорее, это штрихи к портрету читателя.

Повторный заход. Читатель вернулся к статье через день или неделю. Это хороший знак, но не такой мощный, как сохранение. Скорее, индикатор того, что тема долгоиграющая.

Время на материале. Читатель провёл на статье три минуты. Много это или мало? Зависит от длины текста. Если статья на 1500 знаков, а он сидел пять минут — возможно, отошёл за чаем. Если статья на 4000 знаков, а он ушёл через минуту — явно не дочитал. Алгоритм смотрит на время в связке с другими сигналами. Поэтому, если вы при прочтении материала другого автора раз в пять минут пролистаете экран вниз и пойдёте дальше заниматься своими делами, думая, что главное — тупо добраться до конца, то, к сожалению, огорчим: читать надо вовлечённо. ☝️
Как это работает в комплекте?

Важно понимать: алгоритм не смотрит на один сигнал изолированно. Он оценивает коктейль. Много просмотров, но мало дочитываний — плохо. Мало просмотров, но высокий процент дочитываний — хорошо. Много лайков, но нет комментариев — средне. Есть всё: дочитывания, лайки, комментарии и сохранения — идеально, расширяем показы до небес.
</p>
            
            <div class="subchapter-title">1.3. Принцип снежного кома: как запускаются волны показов</div>
            <p>Публикация не получает всю аудиторию сразу. Сначала её видят несколько десятков или сотен человек — ядро твоих подписчиков или случайная выборка по интересам. Если они реагируют хорошо, алгоритм расширяет аудиторию. Если плохо — показы затухают. Так работают волны: первая тестовая, вторая основная, третья остаточная. Понимание этого механизма снимает вопрос «почему в первый час тишина». Потому что алгоритм ещё не успел подобрать нужную для твоего канала аудиторию. И не стоит ожидать бешеных показов в первые несколько недель. ☝️</p>
            
            <div class="subchapter-title">1.4. Главные мифы новичков об алгоритме </div>
            <p>«Меня забанили втихую», «платформа не любит новичков», «надо постить строго в 8 утра», «если день ничего не публиковать — канал умрёт». Откуда берутся эти страхи и почему они не имеют отношения к реальности? Давай разбираться! ✨

Миф №1. «Меня забанили втихую»

Классика жанра. У автора упали охваты, и вместо того чтобы посмотреть на статистику, он выносит вердикт: «Всё, меня забанили. Теневой бан. Алгоритм меня похоронил». Дальше идут посты в чатах с вопросом «У всех тишина или только у меня?», и десятки таких же напуганных коллег отвечают: «И у меня! Значит, точно банят!».

Давай по-честному. Теневой бан существует, но он случается в разы реже, чем о нём говорят. В девяти случаях из десяти упавшие охваты — это не кара небесная, а реакция алгоритма на твой контент. Скучный заголовок, нецепляющая обложка, низкие дочитывания — и система просто перестала тратить на тебя показы. Она не злится, ей просто незачем показывать то, что не читают.

Теневой бан — это когда канал реально ограничен за нарушения. У него есть конкретные причины: жалобы пользователей, дублированный контент, системные неуникальные тексты. Обычно платформа предупреждает об этом. Если предупреждений не было — скорее всего, дело не в бане. Просто посмотри на свои последние публикации и честно спроси: «Я бы сам это открыл?» И если твой ответ — ДА, то хорошо, молодец! 💪

Миф №2. «Платформа не любит новичков»

Ещё один хит. Якобы Дзен продвигает только крупные каналы, а маленьким не даёт ни шанса. Новички обречены сидеть с двадцатью показами, пока не купят рекламу или не продадут душу алгоритму.

На деле всё ровно наоборот. Платформа обожает новичков, которые делают классный контент. Потому что каждый новый сильный автор — это дополнительные минуты, которые пользователь проводит в Дзене. А время пользователя — главная валюта. Алгоритм охотно даёт шанс: первые показы летят ядерной аудитории или случайной выборке по интересам. Если материал заходит — показы расширяют. Если нет — увы.

Проблема не в том, что платформа не любит новичков. Проблема в том, что новичок часто выдаёт средний контент и ждёт, что алгоритм вытянет его за уши. Так не бывает. Но если ты с первого поста попал в боль аудитории — поверь, тебя заметят даже с нулём подписчиков. Таких историй полно. Просто о них не кричат в чатах, потому что счастливые авторы заняты делом, а не жалобами.


Миф №3. «Надо постить строго в 8 утра»

Ах, это священное знание… Кто-то говорит — в 7:00, потому что люди листают ленту за завтраком. Кто-то — в 12:00, потому что обеденный скроллинг. Кто-то — в 19:00, потому что вечером все отдыхают. В итоге автор ставит будильник, публикует пост ровно в восемь утра и ждёт чуда. Чуда не происходит. Потому что его аудитория, возможно, просыпается к обеду или читает только ночью.

Универсального времени не существует. Твоя аудитория уникальна. Молодые мамы читают, пока ребёнок спит. Офисные работники — в обед и вечером. Фрилансеры — когда придётся. Единственный способ узнать своё время — тестировать. Публикуй в разные часы, смотри аналитику, отмечай, когда активность выше. Алгоритм не привязан к будильнику. Он привязан к поведению твоих конкретных читателей. Вот у нас в чате есть человек, у которого за всё время ведения канала лучшее время для публикации — вторник! В этот день статистика летит в небеса. В остальные дни недели показы не очень. И что вы теперь на это скажете? 😏

Миф №4. «Если день ничего не публиковать — канал умрёт»

Этот миф заставляет людей постить из последних сил, выдавая сырые, недоработанные материалы. Пропустил день — всё, поезд ушёл, канал похоронен, подписчики разбежались, алгоритм забыл твоё имя.

На самом деле Дзен не Запретграм. Здесь нет штрафа за пропущенный день. Алгоритм не сидит с секундомером, замеряя твои паузы. Подписчики не отписываются пачками только потому, что ты взял выходной. Да, регулярность важна, поэтому из крайности в крайности тоже впадать не надо. Да, долгие пропадания снижают активность аудитории. Но между «публиковать каждый день» и «канал мёртв» — огромная пропасть. Лучше выдать один сильный материал в три дня, чем три слабых подряд, потому что «надо». Качество всегда бьёт количество. И твоя нервная система скажет тебе спасибо.

Миф №5. «Если пост не залетел в первые два часа — можно удалять»

Ох, сколько хороших публикаций погибло из-за этой паники. Автор публикует статью, через час смотрит статистику — мало просмотров. Всё, провал. Удаляем, переписываем, публикуем заново. Или просто удаляем и страдаем.

Но давай вспомним про снежный ком и волны показов, о которых мы говорили раньше. Алгоритму нужно время, чтобы собрать данные о реакциях и принять решение. Иногда публикация разгоняется через несколько часов. Иногда — на следующий день. Иногда — вечером, когда твоя аудитория наконец-то добралась до ленты. Два часа — не диагноз. Не руби с плеча. Дай материалу пожить. Сутки — минимальный срок, чтобы делать выводы. Лучше — двое. У нас есть примеры, когда пост неожиданно залетал через неделю! 🤫

Миф №6. «Один хейтер в комментариях обрушит охваты»

Многие новички боятся негативных комментариев как огня. Кажется, что стоит одному человеку написать гадость — и алгоритм тут же задвинет публикацию в угол. На деле всё ровно наоборот. Комментарий — это вовлечённость. Даже негативный. Он даёт сигнал: с материалом взаимодействуют, он вызывает эмоции. А эмоции — это именно то, что нужно платформе. Не бойся хейтеров. Бойся тишины. Тишина — вот настоящий враг. А с комментаторами всегда можно поговорить. Иногда из хейтера получается самый преданный читатель — такое тоже бывает.

Откуда вообще берутся эти мифы?

Всё просто. Дзен — платформа непрозрачная. Алгоритм не раскрывает всех карт, и это создаёт вакуум. А природа не терпит пустоты: вакуум заполняется догадками, слухами и паникой. Один автор рассказал свою теорию, второй подхватил, третий добавил драмы — и вот уже рождается легенда, которая кочует годами. Добавь сюда тревожность новичков, желание найти простое объяснение сложным вещам и нелюбовь смотреть в статистику — получаем гремучую смесь.

Если кто-то в очередной раз напишет в чате: «Всё, Дзен умер, всех забанили, новичкам не пробиться», — ты теперь знаешь правду. Улыбнись, отложи панику и иди писать. Потому что лучший способ опровергнуть мифы — это сделать хороший контент и увидеть результат своими глазами.</p>
            
            <div class="subchapter-title">2.4. Почему алгоритм — не враг, а инструмент</div>
            <p>Алгоритм действует по чётным правилам для всех, и ваша задача — дать ему именно те сигналы, которые он любит: высокое дочитывание и активность в комментариях. Подружиться с ним просто: пишите то, что люди хотят дочитать до конца, не обманывайте кликбейтными заголовками и регулярно отвечайте подписчикам в комментариях.</p>
                        </div>

            📱 Глава 3 · ФОРМАТЫ КОНТЕНТА</div>
            <p>Дзен предлагает пять основных форматов — статью, пост, горизонтальное видео, вертикальный ролик и нарратив, и у каждого своя задача. Статья и горизонтальное видео хороши для глубокого, вдумчивого контента, где читатель готов потратить 5–15 минут. Пост и вертикальный ролик — для быстрого контакта, новостей и удержания внимания в мобильной ленте за 30–90 секунд. Нарратив — гибрид текста и слайдов, который идеально подходит для списков, коротких историй и инструкций "на один экран".</p>
            <ul style="margin-left: 25px; margin-top: 10px;">
                <li><strong>Статья</strong> (2000+ знаков) — это классический "длинный текст" с заголовком, подзаголовками, изображениями и видео внутри. Лучше всего работает для экспертных материалов, инструкций, обзоров и глубокого анализа. Когда использовать: если тема требует 2000+ знаков, а читатель пришёл за развёрнутым ответом, а не за быстрой новостью.</li>
                <li><strong>Пост</strong> (300–800 знаков) — короткое текстовое сообщение (300–800 знаков), часто с одной картинкой, без сложной структуры. Идеален для новостей, опросов, личных мыслей, анонсов и поддержания "тепла" между большими публикациями. Когда использовать: нужно быстро что то сказать, спросить мнение подписчиков или напомнить о себе без серьёзной нагрузки на читателя.</li>
                <li><strong>Видео горизонтальное</strong> (16:9, 5–10 мин) —занимает середину между основательной статьёй и быстрым роликом. Лучше всего заходит на десктопных версиях и для сложных тем: обучение, разборы, интервью, лекции. Когда использовать: вы хотите показать процесс, эмоцию или лицо — и готовы удерживать внимание на 5–15 минут.</li>
                <li><strong>Вертикальный ролик</strong> (9:16, 30–90 сек) — кформат, который имитирует TikTok и Reels: коротко (30–90 секунд), динамично, без отвлекающих элементов. Дзен любит вертикалки за высокое время удержания в мобильной ленте. Когда использовать: быстрые советы, лайфхаки, эмоциональные зарисовки, нарезки — всё, что потребляет человек в метро и очереди.</li>
                <li><strong>Нарратив</strong> — это последовательность текстовых слайдов (обычно 5–15 штук), которые читатель пролистывает как сторис. Каждый слайд содержит короткую фразу или абзац, часто с фоновой картинкой или цветом. Когда использовать: списки, "история одной проблемы", сценарии "до/после", короткие инструкции на 1 минуту — там, где длинная статья будет перегружена, а видео сложно снять.</li>
            </ul>

        `<div><div class="chapter-badge">⚠️ Глава 4 · ЗАПРЕЩЕННЫЙ КОНТЕНТ</div><p><strong>Шкала:</strong> предупреждение → демонетизация → теневой бан → блокировка. Дзен запрещает публиковать призывы к насилию, разжигание ненависти, порнографию, пропаганду наркотиков и экстремистские материалы — это стандартный набор для любой легальной платформы. Также под запретом «информационный мусор»: заведомо ложные новости, фейковые цитаты знаменитостей, псевдомедицинские советы, которые могут навредить здоровью. Отдельное внимание — авторским правам: копирование чужих текстов и видео без переработки и указания источника приводит к демонетизации или блокировке. 4.2. Шкала наказаний: от предупреждения до блокировки

        `<div><div class="chapter-badge">🎬 Глава 7 · ВИДЕО</div><p>Видеоконтент: первые шаги
Видео на Дзене работает по тем же принципам, что и текст: алгоритм любит удержание, а читатель — пользу с первых секунд, поэтому не тяните с введением и сразу показывайте главное. Для старта достаточно смартфона с хорошим светом и простого микрофона (даже гарнитуры) — зрители простят картинку, но не простят плохой звук. Оптимальный хронометраж для новичка — 3–7 минут: короче вы не успеете раскрыть тему, длиннее — потеряете внимание без наработанной аудитории.
7.1. Минимальные требования к съёмке
Для старта на Дзене не нужна профессиональная камера — достаточно современного смартфона с записью в Full HD (1920×1080), установленного на штатив или устойчивую поверхность. Главное правило видео: звук важнее картинки, поэтому используйте внешний микрофон (петличку за 500–1000 рублей) или хотя бы записывайте голос в тихом помещении без эха. Свет должен падать на вас спереди или сбоку, но не сзади — иначе получится силуэт; самый простой и дешёвый вариант — сидеть лицом к окну в солнечный день.
7.2. Хронометраж: сколько должно длиться видео
Для новичка оптимальная длина видео — от 3 до 7 минут: меньше трёх минут вы не успеете раскрыть тему и дать пользу, больше семи — потеряете внимание без наработанного доверия аудитории. Если тема требует больше времени (обучение, обзор, интервью), разбейте её на серии по 5–7 минут — это повысит дочитываемость каждой части и даст алгоритму больше сигналов удержания. Правило «чем длиннее, тем лучше» работает только для топовых каналов с лояльной аудиторией; новичку короткое и плотное видео даст больше шансов на рекомендации.
7.3. Упаковка видео: обложка, название, описание

14.1. Почему упали охваты: алгоритм поиска причины
Падение охватов (показов) — самый частый и самый тревожный симптом для автора. Но не каждое падение — это катастрофа. Иногда это естественное колебание алгоритма, иногда — ваша ошибка, иногда — теневой бан. Главное — не гадать, а разбираться по шагам.
Пошаговый алгоритм диагностики (15 минут):
Шаг 1. Определите характер падения. Откройте Студию → Статистика → Охват (показы) за последние 30 дней. Посмотрите на график:
•	Резкое падение (обрыв вниз за 1–2 дня на 70–90%) — скорее всего, санкция или серьёзная ошибка.
•	Плавное снижение в течение 7–14 дней — скорее всего, упало качество контента или вы перестали попадать в интересы аудитории.
•	Сезонное падение (например, в январе или июле) — норма для многих ниш, сравнивайте с прошлым годом или с другими авторами в вашей тематике.
Шаг 2. Проверьте дату падения. Совпадает ли оно с какой-то вашей публикацией? Если да — скорее всего, проблема в конкретном материале. Откройте эту публикацию и посмотрите её дочитывание и CTR. Если дочитывание ниже 20% или CTR ниже 2% — алгоритм получил негативный сигнал и сократил показы по всему каналу. Удалите или доработайте этот материал.
Шаг 3. Исключите теневой бан. Признаки: охваты упали, но CTR и дочитывание остались на прежнем уровне (то есть карточка по-прежнему хорошая, но её просто не показывают). Дополнительный признак — новый прирост подписчиков упал почти до нуля. Если это ваш случай — см. Главу 15.1 (Теневой бан).
Шаг 4. Проверьте внешние факторы. Был ли выходной или праздник? В праздники Дзен переключает показы на развлекательный контент. Изменился ли алгоритм платформы (об этом пишут в телеграм-каналах авторов Дзена)? Не было ли сбоя в статистике (иногда цифры восстанавливаются через 1–2 дня сами)?
Шаг 5. Сравните с конкурентами в нише. Если у всех в вашей тематике упали охваты — проблема не в вас. Это глобальное изменение алгоритма или снижение спроса на тему. Если упали только у вас — ищите причину внутри канала.
Шаг 6. Проанализируйте 5 последних публикаций. Посчитайте среднее дочитывание и CTR. Если они ниже вашей обычной нормы на 20% и более — проблема в качестве контента. Вы стали писать хуже (сознательно или нет). Вернитесь к структуре из Главы 5.1 и требованиям к обложке из Главы 6.1.
Шаг 7. Чек-лист «быстрых убийц охватов» (проверьте за 5 минут):
•	Не нарушили ли вы правила? (проверьте уведомления в Студии)
•	Не забыли ли промаркировать ИИ или рекламу?
•	Не было ли массовой жалобы от читателей (есть ли комментарии с негативом)?
•	Не сменили ли вы резко тему канала?
•	Не удаляли ли вы массово старые публикации?
Шаг 8. Если ничего не помогло — подождите 3–5 дней. Иногда падение охватов — это просто случайное колебание. Алгоритм мог временно переключиться на другие темы. Если через 5 дней показатели не начали восстанавливаться, пишите в поддержку Дзена (вежливо приложите скриншоты графика и список того, что вы уже проверили).

14.2. Типичные ошибки, которые авторы не замечают
Большинство проблем на Дзене возникают не из-за злого умысла алгоритма, а из-за ошибок, которые автор совершает регулярно, но не замечает. Вот список из десяти самых незаметных убийц канала:
1. «Водное» введение. Вы начинаете статью с «В современном мире…», «Многие задаются вопросом…», «Сегодня я хотел бы рассказать…». Читатель ждал ответ на свой вопрос, а получил философию. Уходит на 10-й секунде. Исправление: первый абзац — сразу по делу, продолжение заголовка.
2. Оглавление в начале. «В этой статье я расскажу о 5 способах: 1)…, 2)…, 3)…» — это убивает интригу. Читатель видит, что всё перечислено, и закрывает статью, не читая. Исправление: перечислите способы в процессе, а не в оглавлении.
3. Отсутствие картинок. Сплошной текст на экране телефона — это стена, которую мозг отказывается штурмовать. Даже одна картинка каждые 300–500 знаков удлиняет время чтения на 30–40%.
4. Слишком длинные абзацы. Абзац из 10–15 строк на мобильном экране превращается в серую простыню. Норма — 2–4 предложения, не больше 5–6 строк.
5. Блёклые обложки. Вы ставите красивое (но тёмное) фото или мелкий текст на пёстром фоне. В миниатюре размером с почтовую марку это нечитаемо. Исправление: контраст, крупно, лицо человека.
6. Забытый призыв к действию (CTA). Статья закончилась, читатель подумал «полезно» — и ушёл навсегда. Нет призыва «Подпишитесь» или «Напишите в комментариях» — нет ни подписчиков, ни вовлечённости.
7. Непоследовательная тематика. Сегодня про ремонт, завтра про футбол, послезавтра про готовку. Алгоритм не понимает, кому вас показывать, и в итоге не показывает никому. Держитесь 2–3 смежных тем.
8. Слишком редкие публикации. Раз в неделю — мало. Дзен любит регулярность: оптимально 3–5 статей в неделю. Меньше — алгоритм забывает о вас.
9. Слишком частые публикации. 5 статей в день — перебор. Вы начинаете конкурировать сам с собой. Одна хорошая статья в день лучше пяти средних.
10. Игнорирование комментариев. Вы отвечаете только на хвалебные и игнорируете критику или вопросы. Читатели чувствуют, что диалог им не нужен, и перестают писать. Алгоритм видит падение комментариев как сигнал снижения интереса.

14.3. Выгорание: как распознать
Выгорание — это не «лень» и не «плохое настроение». Это физическое и эмоциональное истощение от регулярной творческой работы, которое не проходит после выходных. Авторы Дзена в зоне риска, потому что они одновременно и творцы, и маркетологи, и аналитики, и менеджеры комментариев.
Шкала выгорания (оцените себя от 1 до 10):
•	1–3 балла: вы в порядке. Иногда устаёте, но быстро восстанавливаетесь.
•	4–6 баллов: зона риска. Нужно менять режим или снизить нагрузку.
•	7–10 баллов: острое выгорание. Остановитесь немедленно, иначе бросите канал.
Что делать при выгорании (по шагам):
Шаг 1. Признайте проблему. Выгорание — это не стыдно. Это биологическая реакция на перегрузку. Скажите себе: «Я выгорел. Это нормально. Я приму меры».
Шаг 2. Возьмите паузу на 5–7 дней (минимум!). Полностью отключитесь от Дзена: не заходите в статистику, не читайте комментарии, не думайте о темах. Мир не рухнет. Алгоритм не накажет за паузу в неделю (в отличие от многомесячной). Поставьте автоответчик в комментариях: «Автор отдыхает, вернусь через несколько дней».
Шаг 3. Уменьшите нагрузку после возвращения. Если вы писали 5 статей в неделю, снизьте до 2–3. Если отвечали на все комментарии — отвечайте только на первые 10–20. Создайте запас из 2–3 черновиков, чтобы публиковать в «неписучие» дни.
Шаг 4. Смените фокус. Перестаньте смотреть на просмотры и доход хотя бы на неделю. Вспомните, зачем вы вообще начали писать. Удалите приложение Студии с телефона — смотрите статистику только с компьютера, 1 раз в день.
Шаг 5. Найдите поддержку. Вступите в чат авторов Дзена (в Телеграме их десятки). Увидите, что вы не один такой. Возможно, кому-то ещё хуже. Или найдите офлайн-хобби, совсем не связанное с экраном.
Шаг 6. Если ничего не помогает — смените формат или нишу. Попробуйте писать не статьи, а короткие посты. Или наоборот — перейдите на видео. Или смените тему (в рамках близкой ниши). Новизна лечит выгорание.
Шаг 7. Обратитесь к психологу (если выгорание зашкаливает, 7–10 баллов). Это не дорого (есть онлайн-сервисы за 1000–2000 рублей за сессию) и не стыдно. Одна консультация может сэкономить вам месяцы страданий и спасённый канал.
Профилактика выгорания (чтобы не доводить до крайности):
•	Соблюдайте режим: пишите в одно и то же время, но не более 3–4 часов в день.
•	Делегируйте: наймите помощника за 5000 рублей в месяц проверять комментарии или делать обложки.
•	Не сравнивайте себя с топ-блогерами, у которых команда из 5 человек.
•	Выходите на прогулку после каждой написанной статьи (5–10 минут).
•	Помните: канал — это ваш проект, а не ваша жизнь. Если Дзен исчезнет завтра, вы останетесь. Не вкладывайте в него всю свою идентичность.

Глава 15. Санкции: теневой бан, демонетизация, блокировка
Вы делаете всё как раньше, но цифры вдруг рухнули. Или — ещё хуже — заходите в Студию и видите, что доход обнулился. Или канал вообще недоступен.
Добро пожаловать в мир санкций. Дзен никогда не предупреждает о них заранее. Вы узнаёте о проблеме постфактум — по симптомам. И главное, что нужно понять: санкции — это не всегда конец. От одних можно отойти за неделю, другие требуют месяцев работы, третьи — приговор.
В этой главе — пошаговая диагностика трёх главных наказаний: теневой бан (охваты упали, но канал жив), демонетизация (деньги отключили), блокировка (канал удалён). А главное — что делать в каждом случае.

Почему наступает теневой бан (реальные причины):
1.	Масс-лукинг — вы ходите по чужим каналам и оставляете однотипные комментарии «А вот у меня на канале тоже есть про это». Дзен считает это спамом.
2.	Искусственное поведение — вы или ваши подписчики накручиваете лайки через ботов или телеграм-ботов.
3.	Одинаковые действия — 10 человек поставили лайк за 2 секунды после публикации (боты) или оставили идентичные комментарии.
4.	Нарушение тематики — резко сменили нишу: были про ремонт, стали про политику. Алгоритм не понимает, кому вас показывать.
5.	Жалобы от читателей — на вашу публикацию поступило 2–3 «кика» (пожаловались), и Дзен понизил вас в выдаче.
Что делать при теневом бане (пошагово):
Шаг 1. Перестаньте спамить. Не ходите по чужим комментариям, не ставьте лайки пачками. Канал должен вести себя как живой человек, а не как бот.
Шаг 2. Опубликуйте качественный контент (и один). Не пытайтесь закидать Дзен 5 статьями в день — это только ухудшит. Одна сильная публикация, которая гарантированно зацепит ваших старых подписчиков (высокое дочитывание). Подписчики увидят — алгоритм получит позитивный сигнал.
Шаг 3. Попросите подписчиков оставить развёрнутые комментарии. Не «круто», а «спасибо, как раз искал про способ №3». Живые, уникальные комментарии — лучший антидот от теневого бана.
Шаг 4. Не удаляйте старые публикации. Алгоритм любит стабильность. Массовое удаление — это стресс для канала, который может усугубить бан.
Шаг 5. Ждите 7–14 дней. Теневой бан редко длится дольше двух недель, если вы исправили поведение. Если за это время ничего не изменилось — переходите к шагу 6.
Шаг 6. Напишите в поддержку Дзена. Через Студию → ? → Написать в поддержку. Вежливо, без истерик: «Здравствуйте, заметил резкое падение охватов с 15 мая. Канал не нарушал правил. Помогите разобраться». Иногда это помогает.

    const total = pagesContent.length;
    let currentIdx = 0;
    let pageElements = [];
    const bookDiv = document.getElementById('book');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counterSpan = document.getElementById('pageCounter');

    function buildBook() {
        bookDiv.innerHTML = '';
        pageElements = [];
        for (let i = 0; i < total; i++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            const front = document.createElement('div');
            front.className = 'page-front';
            front.innerHTML = pagesContent[i];
            pageDiv.appendChild(front);
            pageDiv.style.transform = i === 0 ? 'rotateY(0deg)' : 'rotateY(180deg)';
            pageDiv.style.pointerEvents = i === 0 ? 'auto' : 'none';
            pageDiv.style.zIndex = total - i;
            bookDiv.appendChild(pageDiv);
            pageElements.push(pageDiv);
        }
        counterSpan.innerText = `стр. 1 / ${total}`;
    }

    function flipToPage(destinationIdx, playSound = true) {
        if (destinationIdx === currentIdx) return;
        if (destinationIdx < 0 || destinationIdx >= total) return;
        
        // Воспроизводим ваш звук при перелистывании
        if (playSound) playPageFlipSound();
        
        const dir = destinationIdx > currentIdx ? 1 : -1;
        const steps = Math.abs(destinationIdx - currentIdx);
        function doFlip(step) {
            if (step === 0) return;
            const next = currentIdx + (dir === 1 ? 1 : -1);
            if (next < 0 || next >= total) return;
            const cur = pageElements[currentIdx];
            const nxt = pageElements[next];
            cur.style.transform = dir === 1 ? 'rotateY(-180deg)' : 'rotateY(180deg)';
            nxt.style.transform = 'rotateY(0deg)';
            cur.style.pointerEvents = 'none';
            nxt.style.pointerEvents = 'auto';
            cur.style.zIndex = total - currentIdx;
            nxt.style.zIndex = total - next;
            currentIdx = next;
            counterSpan.innerText = `стр. ${currentIdx+1} / ${total}`;
            setTimeout(() => doFlip(step - 1), 100);
        }
        doFlip(steps);
    }

    function jumpToPage(pageIndex) {
        flipToPage(pageIndex, true);
    }

    globalJumpToPage = jumpToPage;

    function attachDynamicEvents() {
        document.querySelectorAll('[data-goto-page]').forEach(el => {
            el.removeEventListener('click', dynamicClickHandler);
            el.addEventListener('click', dynamicClickHandler);
        });
        document.querySelectorAll('[data-goto-toc]').forEach(el => {
            el.removeEventListener('click', tocClickHandler);
            el.addEventListener('click', tocClickHandler);
        });
    }

    function dynamicClickHandler(e) {
        const page = parseInt(e.currentTarget.getAttribute('data-goto-page'), 10);
        if (!isNaN(page) && page >= 0 && page < total) {
            jumpToPage(page);
        }
    }

    function tocClickHandler(e) {
        jumpToPage(1);
    }

    const origFlip = flipToPage;
    window.flipToPage = function(idx) {
        origFlip(idx, true);
        setTimeout(() => attachDynamicEvents(), 100);
    };
    flipToPage = function(idx) {
        origFlip(idx, true);
        setTimeout(() => attachDynamicEvents(), 100);
    };

    buildBook();
    prevBtn.addEventListener('click', () => {
        if (currentIdx > 0) flipToPage(currentIdx - 1, true);
    });
    nextBtn.addEventListener('click', () => {
        if (currentIdx < total - 1) flipToPage(currentIdx + 1, true);
    });
    
    document.querySelectorAll('.toc-link').forEach(btn => {
        btn.addEventListener('click', () => {
            let target = parseInt(btn.dataset.page, 10);
            flipToPage(target, true);
        });
    });
    
    setTimeout(() => attachDynamicEvents(), 200);
