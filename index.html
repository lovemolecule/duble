    // ========== ШЕЛЕСТ СТРАНИЦ ==========
    // Создаём аудиоконтекст для шелеста (используем Web Audio API для генерации звука)
    let audioCtx = null;
    let pageFlipSoundEnabled = false;
    
    // Функция для воспроизведения шелеста страницы
    function playPageFlipSound() {
        if (!pageFlipSoundEnabled) return;
        
        try {
            // Если аудиоконтекст ещё не создан, создаём
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Воскрешаем контекст, если он приостановлен
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // Создаём короткий звук шелеста бумаги
            const now = audioCtx.currentTime;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            gainNode.connect(audioCtx.destination);
            
            // Белый шум + фильтр для эффекта шелеста
            const bufferSize = 4096;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = (Math.random() * 2 - 1) * 0.3;
            }
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1200;
            filter.Q.value = 1.5;
            
            noiseSource.connect(filter);
            filter.connect(gainNode);
            noiseSource.start();
            noiseSource.stop(now + 0.25);
            
            // Дополнительный короткий звук (щёлчок бумаги)
            const clickBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const clickOutput = clickBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                const t = i / audioCtx.sampleRate;
                clickOutput[i] = (Math.exp(-t * 80) * (Math.random() * 2 - 1) * 0.2);
            }
            
            const clickSource = audioCtx.createBufferSource();
            clickSource.buffer = clickBuffer;
            const clickGain = audioCtx.createGain();
            clickGain.gain.setValueAtTime(0.08, now);
            clickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
            clickSource.connect(clickGain);
            clickGain.connect(audioCtx.destination);
            clickSource.start();
            clickSource.stop(now + 0.1);
            
        } catch(e) {
            console.warn('Sound not supported:', e);
        }
    }
    
    // Функция активации звука (должна быть вызвана после первого касания пользователя)
    function enablePageFlipSound() {
        if (pageFlipSoundEnabled) return;
        pageFlipSoundEnabled = true;
        
        // Создаём и резолвим аудиоконтекст
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        console.log('✅ Page flip sound enabled');
    }
    
    // Автоматически включаем звук при первом любом взаимодействии с приложением
    function setupSoundOnFirstInteraction() {
        const events = ['click', 'touchstart', 'touchend'];
        const handler = () => {
            enablePageFlipSound();
            events.forEach(ev => document.body.removeEventListener(ev, handler));
        };
        events.forEach(ev => document.body.addEventListener(ev, handler));
    }
    setupSoundOnFirstInteraction();

        `<div><div class="chapter-badge">📚 ЧАСТЬ I · Глава 1</div><h1 class="ency-title">Словарь автора (1–15)</h1><div class="glossary-grid"><div class="term"><strong>1. Алгоритм Дзена</strong> — нейросеть ранжирования.</div><div class="term"><strong>2. Вовлечённость (ER)</strong> — лайки+комменты+репосты.</div><div class="term"><strong>3. Воронка чтения</strong> — путь от показа до дочитывания.</div><div class="term"><strong>4. Дочитывание</strong> — главная валюта Дзена.</div><div class="term"><strong>5. Заголовок</strong> — 80% успеха клика.</div><div class="term"><strong>6. Карточка</strong> — обложка+заголовок.</div><div class="term"><strong>7. Канал</strong> — ваш дом в Дзене.</div><div class="term"><strong>8. Кликбейт</strong> — допустим в меру.</div><div class="term"><strong>9. Монетизация</strong> — рекламный доход после 100 подписчиков.</div><div class="term"><strong>10. Нарратив</strong> — слайд-история.</div><div class="term"><strong>11. Обложка</strong> — 16:9, контрастная.</div><div class="term"><strong>12. Охват</strong> — уникальные показы.</div><div class="term"><strong>13. CTA</strong> — призыв к действию.</div><div class="term"><strong>14. Просмотр</strong> — клик по карточке.</div><div class="term"><strong>15. Статистика</strong> — пульс канала.</div></div><button class="back-to-toc" data-goto-toc="1">📌 К содержанию</button></div>`,

        `<div><div class="chapter-badge">🎬 Глава 7 · ВИДЕО</div><p>Для старта: смартфон + петличка. Хронометраж 3–7 минут. Обложка: лицо+эмоция+короткий текст</p><div class="chapter-badge">🤖 Глава 8 · ИИ</div><p>ИИ разрешён, но обязательна маркировка в первом абзаце: «Создано ИИ». Без маркировки → демонетизация.</p><div class="chapter-badge">💬 Глава 9 · КОММЕНТАРИИ</div><p>Отвечайте на первые 20–30 комментов в первые сутки — запуск волны показов.</p><button class="back-to-toc" data-goto-toc="1">📚 Содержание</button></div>`,
        // 7 - Деньги + налоги
        `<div><div class="chapter-badge">💰 ГЛАВА 10-11 · ЗАРАБОТОК</div><h1 class="ency-title">Основная монетизация</h1><p>Условия: 100 подписчиков, 7 дней активности. CPM: финансы до 800₽, юмор 30–100₽. Новичок: 500–3000₽/мес при 5–10 статьях.</p><div class="chapter-badge">📌 Дзен-Подписки и донаты</div><p>Подписки 99–599₽/мес (комиссия 30%), донаты «Спасибо» — 0% комиссии.</p><div class="chapter-badge">🧾 ГЛАВА 12 · НАЛОГИ</div><p>Самозанятость (НПД): 4% (физлица) / 6% (юрлица). Регистрация в «Мой налог». Без самозанятости Дзен удерживает 13%.</p><button class="back-to-toc" data-goto-toc="1">🔖 К содержанию</button></div>`,
        // 8 - Аналитика
        `<div><div class="chapter-badge">📊 ЧАСТЬ V · АНАЛИТИКА</div><h1 class="ency-title">Ключевые метрики для роста</h1><ul><li><strong>Показы vs просмотры</strong> — 90–97% потерь норма.</li><li><strong>Дочитывания</strong> — выше 30% для длинных статей.</li><li><strong>CTR</strong> 3–7% норма, ниже 2% — меняйте обложку.</li><li><strong>Время просмотра</strong> — суммарное влияет на ранжирование.</li><li><strong>Подписчики</strong> — конверсия 0.5–3%.</li></ul><div class="warning-card">📉 Проверяйте дочитывания регулярно!</div><button class="back-to-toc" data-goto-toc="1">📚 К оглавлению</button></div>`,
        // 9 - Кризисы
        `<div><div class="chapter-badge">🆘 ЧАСТЬ VI · КРИЗИСЫ</div><h1 class="ency-title">Падение охватов: алгоритм</h1><p><strong>Шаг 1:</strong> определить характер. <strong>Шаг 2:</strong> проверить 5 последних публикаций. <strong>Шаг 3:</strong> исключить теневой бан.</p><div class="chapter-badge">🔥 ВЫГОРАНИЕ</div><p>Пауза 5–7 дней, снизить планку до 2 статей в неделю.</p><div class="chapter-badge">⚖️ САНКЦИИ</div><p><strong>Теневой бан:</strong> качественный контент + живые комментарии. <strong>Демонетизация:</strong> удалить нарушение, подать апелляцию. <strong>Блокировка:</strong> за тяжёлые нарушения — не восстанавливается.</p><button class="back-to-toc" data-goto-toc="1">📖 К содержанию</button></div>`
    ];

    const total = pagesContent.length;
    let currentIdx = 0;
    let pageElements = [];
    const bookDiv = document.getElementById('book');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counterSpan = document.getElementById('pageCounter');

    function buildBook() {
        bookDiv.innerHTML = '';
        pageElements = [];
        for (let i = 0; i < total; i++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            const front = document.createElement('div');
            front.className = 'page-front';
            front.innerHTML = pagesContent[i];
            pageDiv.appendChild(front);
            pageDiv.style.transform = i === 0 ? 'rotateY(0deg)' : 'rotateY(180deg)';
            pageDiv.style.pointerEvents = i === 0 ? 'auto' : 'none';
            pageDiv.style.zIndex = total - i;
            bookDiv.appendChild(pageDiv);
            pageElements.push(pageDiv);
        }
        counterSpan.innerText = `стр. 1 / ${total}`;
    }

    function flipToPage(destinationIdx, playSound = true) {
        if (destinationIdx === currentIdx) return;
        if (destinationIdx < 0 || destinationIdx >= total) return;
        
        // Воспроизводим шелест при перелистывании
        if (playSound) playPageFlipSound();
        
        const dir = destinationIdx > currentIdx ? 1 : -1;
        const steps = Math.abs(destinationIdx - currentIdx);
        function doFlip(step) {
            if (step === 0) return;
            const next = currentIdx + (dir === 1 ? 1 : -1);
            if (next < 0 || next >= total) return;
            const cur = pageElements[currentIdx];
            const nxt = pageElements[next];
            cur.style.transform = dir === 1 ? 'rotateY(-180deg)' : 'rotateY(180deg)';
            nxt.style.transform = 'rotateY(0deg)';
            cur.style.pointerEvents = 'none';
            nxt.style.pointerEvents = 'auto';
            cur.style.zIndex = total - currentIdx;
            nxt.style.zIndex = total - next;
            currentIdx = next;
            counterSpan.innerText = `стр. ${currentIdx+1} / ${total}`;
            setTimeout(() => doFlip(step - 1), 100);
        }
        doFlip(steps);
    }

    function jumpToPage(pageIndex) {
        flipToPage(pageIndex, true);
    }

    globalJumpToPage = jumpToPage;

    function attachDynamicEvents() {
        document.querySelectorAll('[data-goto-page]').forEach(el => {
            el.removeEventListener('click', dynamicClickHandler);
            el.addEventListener('click', dynamicClickHandler);
        });
        document.querySelectorAll('[data-goto-toc]').forEach(el => {
            el.removeEventListener('click', tocClickHandler);
            el.addEventListener('click', tocClickHandler);
        });
    }

    function dynamicClickHandler(e) {
        const page = parseInt(e.currentTarget.getAttribute('data-goto-page'), 10);
        if (!isNaN(page) && page >= 0 && page < total) {
            jumpToPage(page);
        }
    }

    function tocClickHandler(e) {
        jumpToPage(1);
    }

    const origFlip = flipToPage;
    window.flipToPage = function(idx) {
        origFlip(idx, true);
        setTimeout(() => attachDynamicEvents(), 100);
    };
    flipToPage = function(idx) {
        origFlip(idx, true);
        setTimeout(() => attachDynamicEvents(), 100);
    };

    buildBook();
    prevBtn.addEventListener('click', () => {
        if (currentIdx > 0) flipToPage(currentIdx - 1, true);
    });
    nextBtn.addEventListener('click', () => {
        if (currentIdx < total - 1) flipToPage(currentIdx + 1, true);
    });
    
    document.querySelectorAll('.toc-link').forEach(btn => {
        btn.addEventListener('click', () => {
            let target = parseInt(btn.dataset.page, 10);
            flipToPage(target, true);
        });
    });
    
    setTimeout(() => attachDynamicEvents(), 200);

    // ========== VK Bridge ИНИЦИАЛИЗАЦИЯ + ВОДЯНОЙ ЗНАК ==========
    (function() {
        if (typeof vkBridge !== 'undefined') {
            vkBridge.subscribe((event) => {
                console.log('VK Bridge event:', event.detail);
            });
            
            vkBridge.send('VKWebAppInit')
                .then(() => {
                    console.log('✅ VK Mini App initialized');
                    return vkBridge.send('VKWebAppDisableScreenshots')
                        .catch(() => vkBridge.send('VKWebAppSetScreenshotSettings', { is_secret: true }));
                })
                .then(() => console.log('✅ Screenshot protection attempt done'))
                .catch((error) => console.error('❌ VK Bridge error:', error))
                .finally(() => {
                    vkBridge.send('VKWebAppGetUserInfo')
                        .then(data => {
                            const watermark = document.createElement('div');
                            watermark.style.cssText = 'position:fixed; bottom:6px; left:8px; font-size:9px; color:rgba(100,70,40,0.25); font-family:monospace; pointer-events:none; z-index:9999; background:transparent; white-space:nowrap;';
                            watermark.innerText = `Дзенопедия • ID:${data.id} • ${new Date().toLocaleDateString()}`;
                            document.body.appendChild(watermark);
                        })
                        .catch(err => {
                            const watermark = document.createElement('div');
                            watermark.style.cssText = 'position:fixed; bottom:6px; left:8px; font-size:9px; color:rgba(100,70,40,0.25); font-family:monospace; pointer-events:none; z-index:9999;';
                            watermark.innerText = `Дзенопедия • Демо-режим`;
                            document.body.appendChild(watermark);
                        });
                });
        } else {
            const body = document.querySelector('.book-wrapper');
            const hint = document.createElement('div');
            hint.style.cssText = 'background:#f0e0d0;padding:8px 16px;border-radius:30px;text-align:center;margin-bottom:15px;font-size:13px;color:#7a5a40;';
            hint.innerText = '💡 Предпросмотр вне VK. Приложение станет полноценным внутри ВКонтакте.';
            body.insertBefore(hint, body.firstChild);
            
            const demoWatermark = document.createElement('div');
            demoWatermark.style.cssText = 'position:fixed; bottom:6px; left:8px; font-size:9px; color:rgba(100,70,40,0.25); font-family:monospace; pointer-events:none; z-index:9999;';
            demoWatermark.innerText = `Дзенопедия • Демо‑режим`;
            document.body.appendChild(demoWatermark);
        }
    })();
</script>
</body>
</html>
