<script>
    // ========== ШЕЛЕСТ СТРАНИЦ ==========
    let flipAudio = null;
    let pageFlipSoundEnabled = false;
    
    function playPageFlipSound() {
        if (!pageFlipSoundEnabled) return;
        try {
            if (!flipAudio) {
                flipAudio = new Audio('page-flip-sound.mp3');
                flipAudio.volume = 0.3;
                flipAudio.preload = 'auto';
            }
            flipAudio.currentTime = 0;
            flipAudio.play().catch(e => console.log('Audio play blocked'));
        } catch(e) { console.warn('Sound error:', e); }
    }
    
    function enablePageFlipSound() {
        if (pageFlipSoundEnabled) return;
        pageFlipSoundEnabled = true;
        if (!flipAudio) {
            flipAudio = new Audio('page-flip-sound.mp3');
            flipAudio.volume = 0.3;
            flipAudio.load();
        }
    }
    
    function setupSoundOnFirstInteraction() {
        const events = ['click', 'touchstart', 'touchend'];
        const handler = () => {
            enablePageFlipSound();
            events.forEach(ev => document.body.removeEventListener(ev, handler));
        };
        events.forEach(ev => document.body.addEventListener(ev, handler));
    }
    setupSoundOnFirstInteraction();

    let globalJumpToPage = null;

    // ========== КОНТЕНТ СТРАНИЦ (10 страниц) ==========
    const pagesContent = [
        // 0 - Вступление
        `<div>
            <div class="hero-image" style="height:130px; margin-bottom:20px;"></div>
            <div class="chapter-badge">✨ ДЗЕНОПЕДИЯ FREE ✨</div>
            <h1 class="ency-title">Вступление. О чём эта книга и кому она нужна</h1>
            <div class="intro-text">
                <p>Доброго времени! Итак, раз ты сейчас читаешь этот текст, значит, ты уже создал свой канал на платформе Дзен. Наши поздравления! Начало прекрасного пути положено. Но это только начало. ☝️</p><br>
                <p>Наша команда довольно долго собирала знания о платформе самыми разными способами: от личного опыта до обучения во внешних источниках. И мы готовы передать эти знания тебе. Почему? Да просто потому, что ты захотел их получить и пришёл к нам! Ой, что это такое? Держи! Доставай вкусняшки, бери кофеёк, сейчас будем учиться! ✨</p><br>
                <p>Итак, ты внутри платформы. Канал создан, несколько первых публикаций уже вышли. Методом тыка ты нашёл внутреннее меню своего канала. Перед глазами тут же всплыли многочисленные графики, статистика что-то показывает. Но вместо радости — недоумение. Вопросов куча, а что с ними делать и к кому идти? Сюда иди!!!☺️</p>
            </div>
            <p style="font-weight:700; margin-top:10px;">В этой библиотеке знаний можно найти ответы на такие вопросы:</p>
            <ul style="margin: 12px 0 12px 35px; display: flex; flex-direction: column; gap: 8px;">
                <li>👉 Я уже набрал 10 подписчиков и выпустил первую публикацию, почему Дзен меня никому не показывает? Где мои 12 000 показов?</li>
                <li>👉 Дзен оценил мою статью в 10 минут по времени прочтения, почему мне начислили восемь?</li>
                <li>👉 Читатель был у меня на статье, даже поставил мне лайк и оставил комментарий, почему Дзен не засчитал это прочтение?</li>
                <li>👉 Вот я вааааще не понимаю ничего в этих графиках! Как разобраться?</li>
                <li>👉 Реально ли добраться до заветной монетизации?</li>

                <li>👉 Что нужно сделать, чтобы увеличить рост подписчиков?</li>
            </ul>
            <div class="intro-text">
                <p>И это только верхушка вопросного айсберга! И да, вопросы настоящие :)</p><br>
                <p>Давай сразу успокоимся, не надо паники: ты не один такой. Вообще не один. Абсолютно каждый автор когда-то сидел с 10 подписчиками.</p><br>
                <p>Тысячи людей сдаются уже после первой недели создания канала. А ты уже молодец, потому что хочешь разбираться, потому что ищешь ответы!</p><br>
                <p><strong>Дзен — это марафон, а не спринт.</strong> Здесь побеждает тот, кто спокоен, методичен и умеет радоваться маленьким цифрам.</p><br>
                <p style="font-size:1.2rem; font-weight:bold;">Поехали! 🚀</p>
            </div>
            <div style="margin-top:20px;"><button class="back-to-toc" data-goto-toc="1">📑 Вернуться к содержанию</button></div>
        </div>`,
        // 1 - Содержание
        `<div>
            <div class="chapter-badge">📖 СОДЕРЖАНИЕ (нажми на любую главу)</div>
            <h1 class="ency-title">Все главы Дзенопедии</h1>
            <div style="margin: 25px 0;">
                <div class="toc-link-chapter" data-goto-page="0">✨ Вступление — стр.1</div>
                <div style="font-weight:700; margin-top:15px;">Часть I. Как устроен Дзен</div>
                <div class="toc-link-chapter" data-goto-page="2">📖 Глава 1. Словарь терминов (стр.3)</div>

        // 2 - Словарь терминов
        `<div>
            <div class="chapter-badge">📚 ГЛАВА 1 · СЛОВАРЬ ТЕРМИНОВ</div>
            <h1 class="ency-title">Базовые термины Дзена</h1>
            <div class="glossary-grid">
                <div class="term"><strong>Дочитывание</strong> — процент читателей, дошедших до конца. Главный сигнал для алгоритма.</div>
                <div class="term"><strong>CTR (Click-Through Rate)</strong> — отношение числа кликов к показам: (клики / показы) × 100%.</div>
                <div class="term"><strong>Время просмотра</strong> — суммарное время, проведённое пользователями на контенте.</div>
                <div class="term"><strong>CPM (Cost Per Mille)</strong> — стоимость 1000 показов рекламы, от которой зависит доход.</div>
                <div class="term"><strong>Показы</strong> — сколько раз карточка публикации появилась в ленте рекомендаций.</div>
                <div class="term"><strong>Просмотры</strong> — сколько раз пользователи кликнули и зашли в публикацию.</div>
                <div class="term"><strong>Ядро аудитории</strong> — самые активные подписчики, читающие всё подряд.</div>
                <div class="term"><strong>Волны показов</strong> — этапы расширения рекомендаций: тестовая, основная, остаточная.</div>
                <div class="term"><strong>Лид (введение)</strong> — первый абзац статьи, который должен зацепить читателя.</div>
                <div class="term"><strong>Обложка (превью)</strong> — картинка в ленте до клика на публикацию.</div>
                <div class="term"><strong>Монетизация</strong> — подключение дохода от рекламы после выполнения условий.</div>
                <div class="term"><strong>Студия Дзена</strong> — панель управления каналом, где смотрят статистику.</div>
                <div class="term"><strong>Демонетизация</strong> — отключение рекламы на канале за нарушения.</div>
                <div class="term"><strong>Теневой бан</strong> — неофициальное ограничение охватов без уведомления.</div>
                <div class="term"><strong>Кликбейт</strong> — заголовок, который обещает то, чего нет внутри.</div>
            </div>
            <div class="warning-card">🧠 <strong>Совет:</strong> Сохраните этот словарь — он поможет понимать аналитику.</div>

        // 3 - Алгоритм + Форматы
        `<div>
            <div class="chapter-badge">⚙️ Глава 2. Алгоритм Дзена</div>
            <h1 class="ency-title">Что такое алгоритм Дзена на самом деле</h1>
            <div class="intro-text">
                <strong>Итак, основная часть успеха твоего канала заключается в постижении системы работы алгоритмов.☝️</strong><br>
                Алгоритм — это система, которая решает, кому показать твой контент. Это программа, анализирующая реакцию читателей: дочитывают ли до конца, ставят ли лайки, пишут ли комментарии. Если реакция хорошая — алгоритм показывает статью всё новым людям. Если читатели уходят через три секунды — показы затухают.
            </div>
            <div class="subchapter-title">Положительные сигналы для алгоритма</div>
            <p><strong>Дочитывание</strong> — самый жирный плюс. Ради него мы здесь и собрались.<br>
            <strong>Лайк</strong> — одобрение. Один лайк весит немного, но когда их десятки — система понимает, что тема зашла.<br>
            <strong>Комментарий</strong> — мощный сигнал вовлечённости. А если автор ещё и ответил — два сигнала по цене одного.<br>
            <strong>Сохранение</strong> — говорит, что контент долгоиграющий.<br>
            <strong>Репост</strong> — сигнал высшего уровня, максимум доверия.<br>
            <strong>Подписка после прочтения</strong> — канал производит впечатление.</p>
            
            <div class="subchapter-title">Главные мифы новичков</div>
            <p><strong>Миф №1. «Меня забанили втихую»</strong> — в 9 случаях из 10 упавшие охваты это реакция на качество контента.<br>
            <strong>Миф №2. «Платформа не любит новичков»</strong> — платформа обожает новичков, которые делают классный контент.<br>
            <strong>Миф №3. «Надо постить строго в 8 утра»</strong> — универсального времени не существует, тестируйте свою аудиторию.<br>
            <strong>Миф №4. «Если день ничего не публиковать — канал умрёт»</strong> — нет штрафа за пропущенный день, качество важнее количества.<br>
            <strong>Миф №5. «Если пост не залетел в первые два часа — можно удалять»</strong> — дайте материалу хотя бы сутки.</p>
            
            <div class="chapter-badge" style="margin-top:30px;">📱 Глава 3 · ФОРМАТЫ КОНТЕНТА</div>
            <p>Дзен предлагает пять основных форматов:</p>
            <ul style="margin-left: 25px; margin-top: 10px;">
                <li><strong>Статья</strong> (2000+ знаков) — классический "длинный текст" для экспертных материалов.</li>

    const total = pagesContent.length;
    let currentIdx = 0;
    let pageElements = [];
    const bookDiv = document.getElementById('book');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counterSpan = document.getElementById('pageCounter');

    function buildBook() {
        bookDiv.innerHTML = '';
        pageElements = [];
        for (let i = 0; i < total; i++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            const front = document.createElement('div');
            front.className = 'page-front';
            front.innerHTML = pagesContent[i];
            pageDiv.appendChild(front);
            pageDiv.style.transform = i === 0 ? 'rotateY(0deg)' : 'rotateY(180deg)';
            pageDiv.style.pointerEvents = i === 0 ? 'auto' : 'none';
            pageDiv.style.zIndex = total - i;
            bookDiv.appendChild(pageDiv);
            pageElements.push(pageDiv);
        }
        counterSpan.innerText = `стр. 1 / ${total}`;
    }

    function flipToPage(destinationIdx, playSound = true) {
        if (destinationIdx === currentIdx) return;
        if (destinationIdx < 0 || destinationIdx >= total) return;
        if (playSound) playPageFlipSound();
        
        const dir = destinationIdx > currentIdx ? 1 : -1;
        const steps = Math.abs(destinationIdx - currentIdx);
        function doFlip(step) {
            if (step === 0) return;
            const next = currentIdx + (dir === 1 ? 1 : -1);
            if (next < 0 || next >= total) return;
            const cur = pageElements[currentIdx];
            const nxt = pageElements[next];
            cur.style.transform = dir === 1 ? 'rotateY(-180deg)' : 'rotateY(180deg)';
            nxt.style.transform = 'rotateY(0deg)';
            cur.style.pointerEvents = 'none';
            nxt.style.pointerEvents = 'auto';
            cur.style.zIndex = total - currentIdx;
            nxt.style.zIndex = total - next;
            currentIdx = next;
            counterSpan.innerText = `стр. ${currentIdx+1} / ${total}`;
            setTimeout(() => doFlip(step - 1), 100);
        }
        doFlip(steps);
    }

    function jumpToPage(pageIndex) {
        flipToPage(pageIndex, true);
    }

    globalJumpToPage = jumpToPage;

    function attachDynamicEvents() {
        document.querySelectorAll('[data-goto-page]').forEach(el => {
            el.removeEventListener('click', dynamicClickHandler);
            el.addEventListener('click', dynamicClickHandler);
        });
        document.querySelectorAll('[data-goto-toc]').forEach(el => {
            el.removeEventListener('click', tocClickHandler);
            el.addEventListener('click', tocClickHandler);
        });
    }

    function dynamicClickHandler(e) {
        const page = parseInt(e.currentTarget.getAttribute('data-goto-page'), 10);
        if (!isNaN(page) && page >= 0 && page < total) {
            jumpToPage(page);
        }
    }

    function tocClickHandler(e) {
        jumpToPage(1);
    }

    const origFlip = flipToPage;
    window.flipToPage = function(idx) {
        origFlip(idx, true);
        setTimeout(() => attachDynamicEvents(), 100);
    };
    flipToPage = function(idx) {
        origFlip(idx, true);
        setTimeout(() => attachDynamicEvents(), 100);
    };

    buildBook();
    prevBtn.addEventListener('click', () => {
        if (currentIdx > 0) flipToPage(currentIdx - 1, true);
    });
    nextBtn.addEventListener('click', () => {
        if (currentIdx < total - 1) flipToPage(currentIdx + 1, true);
    });
    
    document.querySelectorAll('.toc-link').forEach(btn => {
        btn.addEventListener('click', () => {
            let target = parseInt(btn.dataset.page, 10);
