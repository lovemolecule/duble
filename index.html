<script>
    // ========== ШЕЛЕСТ СТРАНИЦ (ИЗ ВАШЕГО ФАЙЛА) ==========
    let flipAudio = null;
    let pageFlipSoundEnabled = false;
    
    // Функция для воспроизведения вашего звукового файла
    function playPageFlipSound() {
        if (!pageFlipSoundEnabled) return;
        
        try {
            // Если звук ещё не создан — создаём
            if (!flipAudio) {
                flipAudio = new Audio('page-flip-sound.mp3');
                flipAudio.volume = 0.3;  // Громкость (0.0 - 1.0), можно изменить
                flipAudio.preload = 'auto';
            }
            
            // Перематываем в начало и воспроизводим
            flipAudio.currentTime = 0;
            flipAudio.play().catch(e => console.log('Audio play blocked until user interaction'));
            
        } catch(e) {
            console.warn('Sound error:', e);
        }
    }
    
    // Функция активации звука (вызывается после первого касания пользователя)
    function enablePageFlipSound() {
        if (pageFlipSoundEnabled) return;
        pageFlipSoundEnabled = true;
        
        // Предварительно загружаем звук
        if (!flipAudio) {
            flipAudio = new Audio('page-flip-sound.mp3');
            flipAudio.volume = 0.3;
            flipAudio.load();
        }
        
        console.log('✅ Page flip sound enabled (your custom sound)');
    }
    
    // Автоматически включаем звук при первом любом взаимодействии с приложением
    function setupSoundOnFirstInteraction() {
        const events = ['click', 'touchstart', 'touchend'];
        const handler = () => {
            enablePageFlipSound();
            events.forEach(ev => document.body.removeEventListener(ev, handler));
        };
        events.forEach(ev => document.body.addEventListener(ev, handler));
    }
    setupSoundOnFirstInteraction();

    // ========== ГЛОБАЛЬНАЯ ФУНКЦИЯ ПЕРЕХОДА ==========
    let globalJumpToPage = null;

    // ========== КОНТЕНТ СТРАНИЦ (10 страниц) ==========
    const pagesContent = [
        // 0 - Вступление
        `<div>
            <div class="hero-image" style="height:130px; margin-bottom:20px;"></div>
            <div class="chapter-badge">ДЗЕНОПЕДИЯ FREE</div>
            <h1 class="ency-title">Энциклопедия автора Дзен</h1>
            <p style="font-size:1.2rem; font-weight:500;">Приложение для автора, который уже завёл Дзен канал и хочет понять, что делать дальше.</p>
            <div style="background:#F4E9DB; border-radius:28px; padding:24px; margin:20px 0;">
                <p style="font-size:1rem;">Вы завели канал на Дзене, опубликовали первые материалы, но вместо миллионов просмотров — тишина и пара лайков от друзей и кота?<br><strong>Поздравляем, вы прошли самый простой этап.</strong> Дальше начинается самое интересное и неочевидное.</p>
            </div>
            <p>«Дзенопедия» — не сборник вдохновляющих цитат, а прикладная инструкция. Здесь вы получите систему: чёткие термины, честные алгоритмы, реальные метрики.</p>
            <div style="margin-top:20px"><span class="floating-icon">🧭</span> <strong>После этой книги</strong> вы перестанете быть игрушкой алгоритма.</div>
            <div style="margin-top:30px;"><button class="back-to-toc" data-goto-toc="1">📑 Вернуться к содержанию</button></div>
        </div>`,
        // 1 - СОДЕРЖАНИЕ с кликабельными гиперссылками на главы
        `<div>
            <div class="chapter-badge">📖 СОДЕРЖАНИЕ (нажми на любую главу)</div>
            <h1 class="ency-title">Все главы Дзенопедии</h1>
            <div style="margin: 25px 0;">
                <div class="toc-link-chapter" data-goto-page="0">📘 Вступление — стр.1</div>
                <div style="font-weight:700; margin-top:15px;">Часть I. Как устроен Дзен</div>
                <div class="toc-link-chapter" data-goto-page="2">📖 Глава 1. Словарь 1–15 (стр.3)</div>
                <div class="toc-link-chapter" data-goto-page="3">📖 Глава 1. Словарь 16–30 (стр.4)</div>
                <div class="toc-link-chapter" data-goto-page="4">📖 Глава 2. Алгоритм Дзена + Глава 3. Форматы (стр.5)</div>
                <div class="toc-link-chapter" data-goto-page="5">📖 Глава 4. Свод правил + Глава 5-6. Стратегия статей (стр.6)</div>
                
                <div style="font-weight:700; margin-top:15px;">Часть II. Стратегия контента</div>
                <div class="toc-link-chapter" data-goto-page="6">📖 Глава 7. Видео + Глава 8. ИИ + Глава 9. Комментарии (стр.7)</div>
                
                <div style="font-weight:700; margin-top:15px;">Часть IV. Деньги</div>
                <div class="toc-link-chapter" data-goto-page="7">📖 Глава 10-12. Монетизация, CPM, налоги (стр.8)</div>
                
                <div style="font-weight:700; margin-top:15px;">Часть V. Аналитика</div>
                <div class="toc-link-chapter" data-goto-page="8">📖 Глава 13. Ключевые метрики (стр.9)</div>
                
                <div style="font-weight:700; margin-top:15px;">Часть VI. Кризисы</div>
                <div class="toc-link-chapter" data-goto-page="9">📖 Глава 14-15. Падения, выгорание, санкции (стр.10)</div>
            </div>
            <div style="margin-top:20px;"><button class="back-to-toc" data-goto-toc="1">🔖 Обновить содержание</button></div>
        </div>`,
         // 2 - РАСШИРЕННЫЙ СЛОВАРЬ 1-15 (полные определения)
        `<div>
            <div class="chapter-badge">📚 ЧАСТЬ I · Глава 1</div>
            <h1 class="ency-title">Словарь автора (термины 1–15)</h1>
            <div class="intro-text">
                <strong>📖 Без единого языка вы рискуете часами изучать статистику, не понимая, на что смотреть, и выполнять советы «гуру», которые говорят о разном.</strong><br>
                Этот словарь даёт чёткие определения каждому ключевому понятию — от охватов и CTR до теневого бана и демонетизации, чтобы вы говорили с Дзеном на одном языке.
            </div>
            <div class="glossary-grid">
                <div class="term"><strong>1. Алгоритм Дзена</strong> Автоматическая система отбора и ранжирования публикаций. Она анализирует поведение каждого читателя (дочитывает, ставит лайк, уходит быстро) и решает, кому и сколько раз показать вашу статью или видео.</div>
                <div class="term"><strong>2. Вовлечённость (ER — Engagement Rate)</strong> Показатель того, насколько аудитория взаимодействует с вашим контентом: лайки, комментарии, репосты, дочитывания. Высокая вовлечённость — главный сигнал алгоритму «это интересно, дай больше показов».</div>
                <div class="term"><strong>3. Воронка чтения</strong> Путь читателя от карточки в ленте до последнего абзаца. Выглядит так: показ → клик → начало чтения → дочитывание. На каждом этапе теряется часть аудитории, и ваша задача — минимизировать потери.</div>
                <div class="term"><strong>4. Дочитывание</strong> Факт, что читатель долистал публикацию до конца (или до 75–90%, в зависимости от формата). Для Дзена это важнейшая метрика: она говорит «контент удержал внимание».</div>
                <div class="term"><strong>5. Заголовок</strong> Первое, что видит пользователь в карточке. От заголовка зависит 80% успеха клика. Хороший заголовок обещает конкретную пользу, интригует без обмана и делает это в пределах 7–10 слов.</div>
                <div class="term"><strong>6. Карточка публикации</strong> То, что пользователь видит в ленте: обложка + заголовок + название канала. Карточка — это ваше лицо в битве за клик. Проигрышная карточка не спасёт даже блестящий текст.</div>
                <div class="term"><strong>7. Канал</strong> Ваш личный раздел на Дзене, где собираются все публикации. Это ваша медиа-витрина: подписчики видят её в отдельной вкладке, случайные читатели могут зайти через карточку.</div>
                <div class="term"><strong>8. Кликбейт</strong> Заголовок или обложка, создающие преувеличенные ожидания («Вы не поверите, что случилось дальше»). Дзен борется с откровенным кликбейтом, снижая показы, если читатель обманывается и быстро уходит.</div>
                <div class="term"><strong>9. Монетизация</strong> Заработок на Дзене за счёт рекламы, которую платформа встраивает в ваши публикации. Включается автоматически после достижения порога в 100 подписчиков и соблюдения правил.</div>
                <div class="term"><strong>10. Нарратив</strong> Гибрид текста и слайд-шоу: короткие текстовые карточки, которые листает читатель. Удерживает внимание мобильной аудитории лучше длинных статей.</div>
                <div class="term"><strong>11. Обложка</strong> Главное изображение публикации. Должна быть контрастной, читаемой на маленьком экране и соответствовать заголовку. Некачественная обложка убивает CTR независимо от содержания.</div>
                <div class="term"><strong>12. Охват (показы)</strong> Количество уникальных пользователей, которым хотя бы раз показали карточку вашей публикации в ленте. Охват — это «сырая аудитория», из которой только часть кликнет.</div>
                <div class="term"><strong>13. Призыв к действию (CTA — Call to Action)</strong> Фраза в конце публикации: «Напишите в комментариях», «Поставьте лайк», «Подпишитесь». Без прямых призывов даже заинтересованный читатель чаще всего ничего не делает.</div>
                <div class="term"><strong>14. Просмотр</strong> Запуск видео или открытие статьи. Один просмотр считается, если пользователь провёл на странице хотя бы несколько секунд (точный порог Дзен не раскрывает).</div>
                <div class="term"><strong>15. Статистика</strong> Раздел в Студии Дзена с графиками просмотров, дочитываний, CTR, дохода и других метрик. Ваш главный инструмент диагностики — если вы не смотрите статистику, вы работаете вслепую.</div>
            </div>
            <button class="back-to-toc" data-goto-toc="1">📌 К содержанию</button>
        </div>`,
          // 3 - РАСШИРЕННЫЙ СЛОВАРЬ 16-30 (полные определения)
        `<div>
            <div class="chapter-badge">СЛОВАРЬ 16–30</div>
            <div class="glossary-grid">
                <div class="term"><strong>16. Студия Дзена</strong> Личный кабинет автора. Здесь вы загружаете публикации, смотрите статистику, общаетесь с подписчиками, подключаете монетизацию и проверяете уведомления от платформы.</div>
                <div class="term"><strong>17. Теги</strong> Ключевые слова, которые вы указываете для публикации. Помогают алгоритму понять тему и показать материал тем, кто интересуется похожим контентом.</div>
                <div class="term"><strong>18. Уникальность контента</strong> Оригинальность ваших текстов, видео и изображений. Дзен штрафует и демонетизирует каналы, которые копируют чужие материалы или используют масс-маркет пересказы без собственного мнения.</div>
                <div class="term"><strong>19. CPM (Cost Per Mille)</strong> Цена 1000 показов рекламы внутри вашего контента. Чем выше CPM, тем больше вы получаете с тысячи просмотров. CPM зависит от ниши, пола и платёжеспособности аудитории.</div>
                <div class="term"><strong>20. CTR (Click-Through Rate)</strong> Соотношение кликов к показам, выраженное в процентах. CTR карточки = кликнувшие / увидевшие × 100%. Нормой считается 3–7%, высоким — от 10%.</div>

    function flipToPage(destinationIdx, playSound = true) {

        // Воспроизводим ваш звук при перелистывании

            if (next < 0 || next >= total) return;
            const cur = pageElements[currentIdx];

        }
